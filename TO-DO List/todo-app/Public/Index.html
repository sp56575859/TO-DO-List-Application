<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEN Stack To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>📝 My To-Do List</h1>
            <p>MEN Stack (MongoDB, Express, Node.js)</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="What needs to be done?" maxlength="100">
                <button id="addBtn">Add Task</button>
            </div>
            <div class="stats">
                <span id="pendingCount">0</span> pending |
                <span id="completedCount">0</span> completed
            </div>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <div class="empty-state" id="emptyState">
            <p>✨ No tasks yet. Add one above!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
